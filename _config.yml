# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en

timezone: Europe/Istanbul

# jekyll-seo-tag settings
title: Zer0smt

tagline: open source vulnerability research & write-ups

description: >-
  Security research, source code analysis, and vulnerability write-ups by Abdulsamet Sunar.

url: "https://0s1mt.github.io"

github:
  username: 0s1mt

social:
  name: Abdulsamet Sunar
  email: ""
  links:
    - https://github.com/0s1mt

# Site Verification Settings
webmaster_verifications:
  google:
  bing:

# Web Analytics Settings
analytics:
  google:
    id:

# Prefer color scheme setting.
# Available options: light | dark
theme_mode: dark

cdn:

avatar: /assets/img/avatar.jpeg

social_preview_image: /assets/img/preview.png

toc: true

comments:
  provider:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
